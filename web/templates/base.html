<!doctype html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page_title }}</title>
    <link href="/css/daisyui.min.css" rel="stylesheet" />
    <script src="js/tailwindcss.min.js"></script>
    <script defer src="js/alpine.min.js"></script>

    {% block head %}{% endblock %}
  </head>
  <body class="min-h-screen min-w-screen">
    <main
      class="w-full min-h-screen bg-cover bg-center transition-opacity duration-1000 bg-gray-900 overflow-y-auto"
      style="background-image: url(&quot;/api/wallpaper&quot;)"
    >
      {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
  </body>
</html>
